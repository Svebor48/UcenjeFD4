<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sigurna prijava</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="kontejner">
        <div class="ikona-lokot">🔒</div>

        <div class="prijava-kartica">
            <h2 class="naslov forme">Sigurna Prijava</h2>

            <form>
                <div class="input-grupa">
                    <label for="username">Korisničko ime</label>
                    <input type="text" id="username" value="admin">
                </div>

                <div class="input-grupa">
                    <label for="password">Lozinka</label>
                    <input type="password" id="password" value="123456">
                </div>

                <div class="checkbox-grupa">
                    <input type="checkbox" id="remember">
                    <label for="remember">Zapamti uređaj</label>
                </div>

                <button type="submit" class="gumb-prijava">Prijavi se</button>
            </form>
        </div>

        <div class="aktivnosti-sekcija">
            <h3>Nedavne aktivnosti prijave</h3>

            <table class="tablica aktivnosti">
                <thead>
                    <tr>
                        <th>IP ADRESA</th>
                        <th>VRIJEME</th>
                        <th>STATUS</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td>192.168.1.15</td>
                        <td>12:45</td>
                        <td class="status-uspjeh">Uspjeh</td>
                    </tr>
                    <tr>
                        <td>10.0.0.52</td>
                        <td>Jučer</td>
                        <td class="status-greška">Greška</td>
                    </tr>
                    <tr>
                        <td>88.102.x.x</td>
                        <td>01.12.</td>
                        <td></td>
                    </tr>
                </tbody>
            </table>
            <div class="prikaz-teksta">Prikaz zadnja 3 pokušaja</div>

        </div>

    </div>
</body>
</html>
