<!DOCTYPE html>
<html lang="en">
<head>

    <title>Sigurna Prijava</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="lokot">🔒</div>

    <form>
        <h2>Sigurna Prijava</h2>

        <div class="redak-checkbox">
            <input type="checkbox" id="zapamti">
            <label for="zapamti">Zapamti uređaj</label>
        </div>
        
        <button type="submit">Prijavi se</button>

    <h3>Nedavne aktivnosti prijave</h3>
    
    <table>

            <th>IP ADRESA</th>

            <th>STATUS</th>
        </tr>

            <td>192.168.1.15</td>
            <td>12:45</td>
            <td class="uspjeh">Uspjeh</td>
        </tr>
        <tr>
            <td>10.0.0.52</td>
            <td>Jučer</td>
            <td class="greska">Greška</td>
        </tr>
        <tr>
            <td>88.102.x.x</td>
            <td>01.12.</td>
            <td></td>
        </tr>
    </table>

    <p class="tekst-dno">Prikaz zadnja 3 pokušaja</p>

</html>
