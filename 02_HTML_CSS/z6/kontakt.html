<!doctype html>
<html class="no-js" lang="en" dir="ltr">

<head>
    <meta charset="utf-8">
    <meta http-equiv="x-ua-compatible" content="ie=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FPV Akademija - Prijava</title>
    <link rel="stylesheet" href="css/foundation.css">
    <link rel="stylesheet" href="css/app.css">
</head>
<body>
<div>
    <div class="title-bar" data-responsive-toggle="responsive-menu" data-hide-for="medium">
      <button class="menu-icon" type="button" data-toggle="responsive-menu"></button>
      <div class="title-bar-title">Izbornik</div>
    </div>

    <div class="top-bar" id="responsive-menu">
      <div class="top-bar-left">
        <ul class="dropdown menu" data-dropdown-menu>
          <li class="menu-text">FPV Akademija</li>
          <li><a href="index.html">Početna</a></li>
          <li><a href="program.html">Kurikulum</a></li>
          <li class="is-active"><a href="kontakt.html">Prijava</a></li>
        </ul>
      </div>
      <div class="top-bar-right">
        <ul class="menu">
          <li><button type="button" class="button success">Upisi u tijeku</button></li>
        </ul>
      </div>
    </div>

    <div class="grid-container" style="margin-top: 3rem; margin-bottom: 3rem;">
  <div class="grid-x grid-padding-x align-center">
    <div class="cell medium-8 large-6">
      
      <h2>Prijava na FPV Akademiju</h2>
      <p class="subheader">Ispunite obrazac i osigurajte svoje mjesto na sljedećem uvodnom predavanju.</p>
      <hr>

      <form>
        <div class="grid-x grid-padding-x">
          
          <div class="cell small-12">
            <label>Ime i prezime
              <input type="text" placeholder="Npr. Ivan Horvat">
            </label>
          </div>

          <div class="cell small-12">
            <label>E-mail adresa
              <input type="email" placeholder="ime.prezime@email.com">
            </label>
          </div>

          <div class="cell small-12">
            <label>Koji modul vas najviše zanima?
              <select>
                <option value="sve">Zanima me cijeli program (svi moduli)</option>
                <option value="dronovi">Modul 1: Vrste dronova i komponente</option>
                <option value="simulatori">Modul 2: Simulatori i teorija leta</option>
                <option value="elektronika">Modul 3: Elektronika i lemljenje</option>
              </select>
            </label>
          </div>

          <div class="cell small-12">
            <label>Dodatna napomena ili pitanje (opcionalno)
              <textarea placeholder="Napišite ako već imate neko iskustvo s dronovima..." rows="4"></textarea>
            </label>
          </div>

          <div class="cell small-12">
            <button type="submit" class="button success expanded">Pošalji prijavu</button>
          </div>

        </div>
      </form>
      </div>
  </div>
</div>
    <script src="js/vendor/jquery.js"></script>
    <script src="js/vendor/what-input.js"></script>
    <script src="js/vendor/foundation.js"></script>
    <script src="js/app.js"></script>
</body>

</html>
