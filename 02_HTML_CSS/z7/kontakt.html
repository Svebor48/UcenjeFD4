<!DOCTYPE html>
<html lang="hr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FPV Akademija - Prijava i Kontakt</title>
    <link rel="stylesheet" href="css/bootstrap.min.css">
</head>

<body class="d-flex flex-column min-vh-100">

    
    <nav class="navbar bg-body-tertiary fixed-top">
        <div class="container-fluid">
            <a class="navbar-brand fw-bold" href="index.html">🛸 FPV Akademija</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="offcanvas"
                data-bs-target="#offcanvasNavbar" aria-controls="offcanvasNavbar" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="offcanvas offcanvas-end" tabindex="-1" id="offcanvasNavbar"
                aria-labelledby="offcanvasNavbarLabel">
                <div class="offcanvas-header">
                    <h5 class="offcanvas-title" id="offcanvasNavbarLabel">Navigacija</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="offcanvas" aria-label="Close"></button>
                </div>
                <div class="offcanvas-body">
                    <ul class="navbar-nav justify-content-end flex-grow-1 pe-3">
                        <li class="nav-item">
                            <a class="nav-link" href="index.html">Početna</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="program.html">Kurikulum</a>
                        </li>
                        <li class="nav-item">
                            
                            <a class="nav-link active" aria-current="page" href="kontakt.html">Prijava / Kontakt</a>
                        </li>
                    </ul>
                </div>
            </div>
        </div>
    </nav>

    
    <div class="container mt-5 pt-4"></div>

    
    <main class="container my-5" style="max-width: 600px;">
        
        <h1 class="text-center fw-bold mb-3">Prijavi se na akademiju</h1>
        <p class="text-muted text-center mb-5">Ispunite obrazac u nastavku i naš tim će vam se javiti s detaljima.</p>

        
        <div class="bg-white p-4 rounded-3 shadow-sm border">
            <form action="#" method="POST">
                
                
                <div class="form-floating mb-3 text-start">
                    <input type="text" class="form-control" id="floatingName" placeholder="Ivan Horvat" required>
                    <label for="floatingName">Ime i prezime</label>
                </div>

                
                <div class="form-floating mb-3 text-start">
                    <input type="email" class="form-control" id="floatingInput" placeholder="name@example.com" required>
                    <label for="floatingInput">E-mail adresa</label>
                </div>
                
                
                <div class="form-floating mb-4 text-start">
                    <textarea class="form-control" id="floatingTextarea" placeholder="Vaša poruka" style="height: 120px;"></textarea>
                    <label for="floatingTextarea">Vaša poruka ili napomena</label>
                </div>

                
                <div class="d-grid">
                    <button type="submit" class="btn btn-primary fw-bold btn-lg">Pošalji prijavu 🚀</button>
                </div>

            </form>
        </div>

    </main>

    <div class="sticky-bottom">
        &copy; 2026 FPV Akademija
    </div>

    <script src="js/bootstrap.bundle.min.js"></script>
</body>

</html>
